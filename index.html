<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>basicOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{overflow:hidden;background:#111}
#welcome{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff}
#welcome button{padding:12px 24px;margin-top:15px;border:none;border-radius:8px;cursor:pointer}
#desktop{display:none;width:100vw;height:100vh;background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop') center/cover}
#topbar{height:40px;background:rgba(0,0,0,.6);color:white;display:flex;justify-content:space-between;align-items:center;padding:0 15px}
.icons{padding:20px;color:white}
.icon{margin-bottom:20px;cursor:pointer;width:80px;text-align:center}
.window{position:absolute;width:400px;background:white;border-radius:10px;display:none;top:100px;left:150px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.3)}
.titlebar{background:#2563eb;color:white;padding:10px;cursor:move;display:flex;justify-content:space-between}
.content{padding:15px}
.close{cursor:pointer}
</style>
</head>
<body>

<div id="welcome">
<h1>basicOS</h1>
<p>Welcome to my WebOS</p>
<button onclick="enterOS()">Enter</button>
</div>

<div id="desktop">
<div id="topbar">
<div>basicOS</div>
<div id="clock"></div>
</div>

<div class="icons">
<div class="icon" onclick="openWin('about')">📄<br>About</div>
<div class="icon" onclick="openWin('projects')">💻<br>Projects</div>
<div class="icon" onclick="openWin('contact')">📧<br>Contact</div>
</div>

<div class="window" id="about">
<div class="titlebar">About <span class="close" onclick="closeWin('about')">✖</span></div>
<div class="content">
<h3>About Me</h3>
<p>This is my personal WebOS built with HTML, CSS and JavaScript.</p>
</div>
</div>

<div class="window" id="projects">
<div class="titlebar">Projects <span class="close" onclick="closeWin('projects')">✖</span></div>
<div class="content">
<h3>Projects</h3>
<ul>
<li>CRM System</li>
<li>Word Frequency Analyzer</li>
<li>WebOS Portfolio</li>
</ul>
</div>
</div>

<div class="window" id="contact">
<div class="titlebar">Contact <span class="close" onclick="closeWin('contact')">✖</span></div>
<div class="content">
<h3>Contact</h3>
<p>Email: rd.divyansh1809@gmail.com</p>
</div>
</div>
</div>

<script>
function enterOS(){
 document.getElementById('welcome').style.display='none';
 document.getElementById('desktop').style.display='block';
}
function openWin(id){document.getElementById(id).style.display='block';}
function closeWin(id){document.getElementById(id).style.display='none';}

setInterval(()=>{
 document.getElementById('clock').textContent=new Date().toLocaleTimeString();
},1000);

document.querySelectorAll('.window').forEach(win=>{
 let bar=win.querySelector('.titlebar');
 let dragging=false,offsetX=0,offsetY=0;

 bar.addEventListener('mousedown',e=>{
  dragging=true;
  offsetX=e.clientX-win.offsetLeft;
  offsetY=e.clientY-win.offsetTop;
 });

 document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  win.style.left=(e.clientX-offsetX)+'px';
  win.style.top=(e.clientY-offsetY)+'px';
 });

 document.addEventListener('mouseup',()=>dragging=false);
});
</script>
</body>
</html>
